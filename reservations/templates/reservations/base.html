{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AeroMitra{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'reservations/styles.css' %}">
</head>
<body>
    <nav class="topbar">
        <a class="brand" href="{% url 'home' %}">
            <span class="brand-mark">AM</span>
            <span>AeroMitra</span>
        </a>
        <div class="navlinks">
            <a href="{% url 'home' %}">Flights</a>
            <a href="{% url 'agent_booking' %}">Agent Desk</a>
            <a href="{% url 'track_search' %}">Live Tracking</a>
            <a href="{% url 'chatbot' %}">Coupon Bot</a>
        </div>
    </nav>

    {% if messages %}
        <section class="flash-wrap">
            {% for message in messages %}
                <div class="flash {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </section>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
